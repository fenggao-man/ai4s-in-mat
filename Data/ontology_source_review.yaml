categories:
  - name: 催化剂
    terms:
      - name: 活性组分
        description: 铁基催化剂以金属铁(Fe) 作为主要活性组分，是氨合成反应的核心催化中心。活性铁相通常由铁氧化物前驱体经还原活化后形成。
      - name: 前驱体
        description: 常用前驱体包括Fe₃O₄（磁铁矿）、Fe₂O₃（赤铁矿）等。前驱体的选择直接影响还原后铁晶粒的尺寸、分散度及最终催化性能。
      - name: 晶相结构
        description: 还原后形成的α-Fe是主要活性晶相。晶相结构的完整性、晶粒尺寸及缺陷密度对催化活性有显著影响。
      - name: 铁比
        description: 指催化剂中活性铁元素的质量分数或摩尔分数，是衡量催化剂活性组分含量的重要指标。
      - name: 比表面积
        description: 影响活性位点的暴露数量，通常比表面积越大，活性位点越多。
      - name: 孔结构
        description: 包括孔径分布、孔容等，影响反应物和产物的传质效率。
      - name: 粒径
        description: 铁晶粒粒径影响表面原子比例及活性位点密度，存在最佳粒径范围以实现活性与稳定性的平衡。
      - name: 制备方式
        description: 包括熔融法、沉淀法、溶胶-凝胶法、浸渍法等。制备方式直接决定催化剂的物相组成、结构参数及宏观性能。
      - name: 机械强度
        description: 催化剂颗粒抵抗磨损、冲击、压碎的能力，工业上通常以压碎强度、磨损率量化表征。合成氨催化剂在装填、还原、长周期运行过程中，需承受高压气流冲击、床层压力差、温度波动等工况，足够的机械强度可避免催化剂破碎、粉化，防止床层压降升高、装置停车，是催化剂工程化放大的必备指标。

  - name: 助剂
    terms:
      - name: 助剂含量
        description: 助剂在催化剂中的质量占比（或摩尔占比），是配方设计的核心参数。不同类型助剂存在最优添加区间，如电子助剂 K₂O 工业添加量通常为 0.5%~1.5%，结构助剂 Al₂O₃ 添加量通常为 2%~4%；过量添加会覆盖活性位点，不足则无法实现助剂的调控功能。
      - name: 助剂种类
        description: 助剂是决定催化剂活性、稳定性、抗毒性与还原性能的关键组分，本身一般不具备催化活性，但通过与主活性相 α-Fe 及催化剂基体发生结构效应、电子效应、扩散效应与协同效应，实现对催化性能的定向强化。多种助剂复配使用，可形成互补与协同，使催化剂满足工业化长周期、高压、高温、高原料适应性的要求。
      - name: 添加方式
        description: 包括熔融共混法、浸渍法、共沉淀法、离子交换法等。添加方式直接决定助剂在催化剂中的分散性、与活性相的相互作用强度，进而决定助剂功能的发挥效果。

  - name: 反应条件
    terms:
      - name: 温度
        description: 合成氨反应的体系温度。合成氨是放热、体积缩小的可逆反应，热力学上低温利于氨平衡转化率提升，动力学上高温利于加快反应速率；工业铁基催化剂的活性温度区间通常为 400℃~500℃。
      - name: 压力
        description: 合成氨反应体系的绝对压力。压力升高利于氨合成平衡正向移动，同时提升反应速率，工业装置运行压力通常为 10MPa~32MPa，分为高压法、中压法、低压法三大工艺路线；催化剂的性能评价需明确对应压力条件，压力直接影响催化剂的活性与稳定性表现。
      - name: 空速
        description: 单位时间内通过单位体积催化剂的反应原料气体积，单位通常为 h⁻¹，是衡量催化剂原料处理能力的核心参数。空速越高，原料气与催化剂的接触时间越短，单程转化率越低，但装置生产强度越高；工业合成氨装置空速通常为 10000h⁻¹~30000h⁻¹，是催化剂性能评价的关键控制参数。
      - name: 氢氮比
        description: 合成氨原料气中 H₂ 与 N₂ 的摩尔比。合成氨反应的化学计量比为 3:1，工业装置与实验室评价通常控制氢氮比为 2.8~3.2，偏离该比例会直接影响反应平衡与动力学速率，进而影响催化剂活性评价结果，是原料气配比的核心控制指标。
      - name: 进料组成
        description: 反应原料气的全组分构成，除核心的 H₂、N₂外，还包括惰性组分（Ar、CH₄）、毒物组分（H₂O、CO、CO₂、H₂S 等）。惰性组分会降低 H₂、N₂ 的有效分压，毒物组分会导致催化剂中毒失活，进料组成的精准控制是催化剂性能准确评价的前提。
      - name: 气体纯度
        description: 原料气中有效组分（H₂、N₂）的占比，及有害杂质的含量限值。铁基催化剂对氧族化合物、硫磷化合物极为敏感，微量杂质即可导致活性位不可逆中毒失活；实验室评价通常要求原料气纯度≥99.99%，工业装置需严格控制原料气净化深度。
      - name: 反应时间
        description: 催化剂在反应条件下的连续运行时长，是评价催化剂稳定性、寿命的核心时间维度。通过不同反应时间下的性能变化，可量化表征催化剂的失活速率与使用寿命。

  - name: 催化性能
    terms:
      - name: 氨合成活性
        description: 催化剂催化 N₂ 与 H₂ 合成 NH₃ 的核心能力，是催化剂最核心的性能指标。实验室通常以反应器出口氨浓度、氨生成速率、时空产率等量化表征，活性高低直接决定催化剂的工业应用价值。
      - name: 转化率
        description: 特指合成氨反应中，原料气中 N₂（或 H₂）的单程转化比例，是反应进行程度的量化指标，受反应热力学平衡、动力学速率、反应条件、催化剂活性共同影响。
      - name: 选择性
        description: 催化剂催化生成目标产物 NH₃ 的反应占总反应的比例。合成氨铁基催化剂在常规反应条件下对 NH₃ 的选择性接近 100%，该指标在含杂质或非常规条件下的评价中具有重要意义。
      - name: 稳定性
        description: 催化剂在连续运行过程中，保持其活性、选择性等核心性能不发生显著衰减的能力，通常以固定反应条件下长周期运行后的活性保留率量化表征。
      - name: 寿命
        description: 催化剂在工业装置或实验室评价中，保持其性能满足生产或评价要求的连续运行总时长。工业合成氨铁基催化剂的设计寿命通常为 5~10 年。
      - name: 抗毒性
        description: 催化剂抵抗原料气中杂质毒物、维持催化性能不发生不可逆失活的能力。铁基催化剂的毒物主要包括氧族化合物、硫磷化合物、重金属等。

  - name: 表征方法
    terms:
      - name: XRD
        description: 用于测定催化剂的晶相组成、晶粒尺寸、晶格参数、晶相含量、结晶度等信息，是铁基催化剂物相分析的核心手段。
      - name: BET
        description: 基于氮气低温物理吸附，测定催化剂的比表面积、孔容、孔径分布等孔结构参数，是表征催化剂织构性质的标准方法。
      - name: TEM
        description: 用于直观观测催化剂活性相的晶粒尺寸、形貌、分散性、晶面结构、晶格条纹等微观形貌信息。
      - name: SEM
        description: 用于观测催化剂的宏观形貌、颗粒尺寸、表面形貌、孔道分布等微米尺度结构特征。
      - name: XPS
        description: 用于测定催化剂表面的元素组成、元素价态、电子结构、表面物种分布等信息。
      - name: H2-TPR
        description: 用于表征催化剂的还原行为，包括还原起始温度、还原峰值温度、还原程度、还原动力学等信息。
      - name: N2-TPD
        description: 用于表征催化剂对 N₂ 的吸附强度、吸附位点数量、吸附脱附行为。
      - name: NH3-TPD
        description: 用于表征催化剂表面的酸碱性、酸位点数量与强度分布，以及 NH₃ 的吸附脱附性能。
      - name: Mössbauer
        description: 用于精准测定铁元素的价态、配位环境、物相组成、电子自旋态等信息，是解析铁基催化剂中铁物种精细结构的专属核心手段。
      - name: Raman
        description: 用于测定催化剂的分子振动、晶格振动特征，识别催化剂的物相结构、表面物种、缺陷结构等信息。
      - name: FT-IR
        description: 用于测定催化剂表面的官能团、吸附物种、化学键特征等信息，可原位表征合成氨反应过程中 N₂、H₂ 的吸附活化状态与中间体演化。

  - name: 反应机理
    terms:
      - name: 解离吸附
        description: 合成氨反应的经典吸附机理，指 N₂ 分子在铁基催化剂活性位上先发生 N≡N 键断裂，解离为两个 N 原子吸附物种，再逐步与 H 原子发生加氢反应生成 NH₃。
      - name: 缔合吸附
        description: 合成氨反应的补充吸附机理，指 N₂ 分子在催化剂表面吸附后，不直接完全解离，而是先与 H 原子逐步加氢生成 N₂Hₓ 中间体，再发生 N-N 键断裂。
      - name: 加氢步骤
        description: 合成氨反应基元步骤中，吸附态 N 原子（或 N₂Hₓ 中间体）与吸附态 H 原子逐步结合，生成 NH、NH₂、NH₃ 物种的连续基元反应过程。
      - name: 脱附机理
        description: 描述最终产物 NH₃ 从催化剂活性位表面脱附的过程与机制。脱附难易程度直接影响反应速率。
      - name: 活性位模型
        description: 对铁基催化剂上具有氨合成催化活性的位点结构、组成、配位环境的理论描述，经典模型包括 C7 位模型、B5 位模型等。
      - name: 速率控制步骤
        description: 在合成氨反应的连续基元步骤中，反应速率最慢、对总反应速率起决定性作用的基元步骤。工业铁基催化剂上常见为 N₂ 的解离吸附过程。
      - name: 活化能
        description: 合成氨反应发生所需克服的最低能量壁垒，单位为 kJ/mol，是表征催化剂本征活性的核心动力学参数。
      - name: 反应级数
        description: 描述反应速率与反应物、产物分压之间幂函数关系的指数，是反应器设计与动力学模拟的核心参数。
      - name: 吸附热
        description: 反应物或产物在催化剂表面发生吸附过程的焓变，表征吸附物种与催化剂表面的相互作用强度。
      - name: 指前因子
        description: Arrhenius 动力学方程中的前置常数，与催化剂表面活性位数量、吸附物种的碰撞频率、熵变等因素相关。
      - name: 动力学参数
        description: 合成氨反应动力学方程中，用于定量描述反应速率与反应条件、催化剂性质之间关系的参数集合，包括活化能、反应级数、指前因子、吸附平衡常数等。

  - name: 制备工艺
    terms:
      - name: 原料选择
        description: 制备铁基催化剂的前驱体、助剂、辅料等原料的筛选与品质控制，核心包括铁源的纯度、物相、杂质含量，助剂的类型与纯度。
      - name: 混合方式
        description: 将铁源前驱体与各类助剂均匀混合的工艺方法。混合均匀性直接决定助剂在催化剂中的分散效果与性能均一性。
      - name: 成型工艺
        description: 将催化剂母体加工为符合工业装置要求的特定形状、尺寸颗粒的工艺过程，主流包括压片成型、挤条成型、破碎筛分等。
      - name: 焙烧温度
        description: 催化剂前驱体在高温下进行热处理的温度参数。焙烧过程可实现前驱体分解、晶相转变、晶粒生长与结构定型。
      - name: 还原活化
        description: 将氧化态催化剂母体在氢气或氢氮混合气氛围下，通过高温热处理还原为具有催化活性的 α-Fe 的工艺过程，是催化剂获得活性的核心步骤。

